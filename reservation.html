<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reservation - Foodies Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <img id="logo" src="images/logo.png" height="160">
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="reservation.html">Reservation</a>
        <a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<h1 style="text-align: center;">Make a Reservation 📅</h1>

<form class="res-form" id="res-form">
    <div>
        <input style="text-align: center;" type="text" id="name" placeholder="Name" required>
        <br>
        <input type="number" id="people" placeholder="Number of people" required>
        <br>
        <input type="date" id="date" required>
        <input type="time" id="time" required>
        <br>
        <button id="res-btn">Book Now</button>
    </div>
</form>
<p id="res-message" class="res-msg" style="text-align: center; padding: 20px;"></p>

<footer style="text-align: center;">
    <p>© 2026 Foodies Hub</p>
</footer>

<button id="ThemeSwitch" onclick="toggleTheme()">Switch Theme</button>

<script src="js/script.js"></script>

<style>
.res-form {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 40vh;
}

.res-form > div {
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.res-form input {
    text-align: center;
    width: 100%;
    height: 40px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

#res-btn {
    display: block;
    margin: 0 auto 0 auto;
    background: #ff6600;
    border: none;
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.5s;
}

#res-btn:hover {
    background: #ff5500;
    transform: scale(1.05);
}
</style>

</body>
</html>
