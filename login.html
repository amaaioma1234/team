<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Foodies Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <img id="logo" src="images/logo.png" height="160">
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="reservation.html">Reservation</a>
        <a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<section class="contact-container">
    <div class="contact-form">
        <h2 style="text-align: center;">Welcome Back!</h2>
        <form id="loginForm" onsubmit="return validateLogin()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button type="submit" class="submit-btn">Login</button>
            <p style="text-align: center; margin-top: 15px;">
                Don't have an account? <a href="register.html" style="color: #ff6600; text-decoration: none;">Register here</a>
            </p>
        </form>
    </div>
</section>

<button id="ThemeSwitch" onclick="toggleTheme()">Switch Theme</button>

<footer style="text-align: center;">
    <p>© 2026 Foodies Hub</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
