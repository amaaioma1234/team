<body>

<header>
	<img id="logo" src="images/logo.png" height="160">

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="reservation.html">Reservation</a>
		<a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
		<a href="about.html">About</a>
		<a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<section class="hero">
    <h2>📞 Contact Us</h2>
    <p>Get in touch with Foodies Hub</p>
</section>

<div style="display: flex; justify-content: center; padding: 20px;">
    <table class="contact-table">
        <tr>
            <th>📍 Address</th>
            <td>Foodies Street, Town</td>
        </tr>
        <tr>
            <th>📧 Email</th>
            <td>hello@foodieshub.com</td>
        </tr>
        <tr>
            <th>📞 Phone</th>
            <td>+20 123456789</td>
        </tr>
        <tr>
            <th>⏰ Hours</th>
            <td>Sun–Thurs: 9am–12am<br>Fri–Sat: 12pm–9pm</td>
        </tr>
    </table>
</div>

<section>
            <div class="contact-container">
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label for="name">Your Name:</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email:</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
            <p id="contactMessage" class="form-message"></p>
        </section>

<footer style="text-align: center;">
    <p>© 2026 Foodies Hub</p>
</footer>

<button id="ThemeSwitch" onclick="toggleTheme()">Switch Theme</button>

<script src="js/script.js"></script>
</body>
</html>
