<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu - Foodies Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
	<img id="logo" src="images/logo.png" height="160">

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="reservation.html">Reservation</a>
		<a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
		<a href="about.html">About</a>
		<a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<section class="menu-section">

    <h2>🍽️ Our Menu </h2>

    <input type="text" id="search" placeholder="Search food..." onkeyup="searchFood()">

    <div class="view-buttons">
        <button id="gridB" onclick="setGrid()">Grid View</button>
		<button id="listB" onclick="setList()">List View</button>
    </div>

<h2>Menu Table</h2>

<div id="menuContainer" class="grid">
    <div class="food-card">
        <img src="images/burger.png" height="80">
        <h3>Burger</h3>
        <p>$5</p>
        <p>⭐⭐⭐⭐</p>
    </div>

    <div class="food-card">
        <img src="images/pizza.png" height="80">
        <h3>Pizza</h3>
        <p>$8</p>
        <p>⭐⭐⭐⭐⭐</p>
    </div>

    <div class="food-card">
        <img src="images/pasta.png" height="80">
        <h3>Pasta</h3>
        <p>$6</p>
        <p>⭐⭐⭐⭐</p>
    </div>

    <div class="food-card">
        <img src="images/loaded fries.png" height="80">
        <h3>Loaded Fries</h3>
        <p>$4</p>
        <p>⭐⭐⭐⭐</p>
    </div>

    <div class="food-card">
        <img src="images/chicken wings.png" height="80">
        <h3>Chicken Wings</h3>
        <p>$11</p>
        <p>⭐⭐⭐⭐⭐</p>
    </div>

    <div class="food-card">
        <img src="images/drinks.png" height="80">
        <h3>Drinks</h3>
        <p>$2 (per can)</p>
        <p>⭐⭐⭐</p>
    </div>

    <div class="food-card">
        <img src="images/cheese cake.png" height="80">
        <h3>Cheese Cake</h3>
        <p>$4 (per slice)</p>
        <p>⭐⭐⭐⭐</p>
    </div>
	
	<div class="food-card">
        <img src="images/hotdog.png" height="80">
        <h3>Hotdog</h3>
        <p>$5</p>
        <p>⭐⭐⭐⭐</p>
    </div>
</div>

</section>

</section>

<button id="ThemeSwitch" onclick="toggleTheme()">Switch Theme</button>

<footer style="text-align: center;">
    <p>© 2026 Foodies Hub</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
